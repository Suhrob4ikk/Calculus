<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MathCore — генератор иконок</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0f1e; color: #e2e8f0; padding: 40px; text-align: center; }
    h1 { color: #38bdf8; margin-bottom: 8px; }
    p  { color: #94a3b8; margin-bottom: 32px; }
    .cards { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }
    .card { background: #0f172a; border: 1px solid #1e3a5f; border-radius: 16px; padding: 24px; min-width: 220px; }
    canvas { border-radius: 12px; display: block; margin: 0 auto 16px; }
    button {
      background: #0ea5e9; color: #fff; border: none; border-radius: 8px;
      padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #38bdf8; }
    .status { color: #38bdf8; margin-top: 24px; font-size: 14px; }
  </style>
</head>
<body>

<h1>Генератор иконок MathCore</h1>
<p>Нажми «Скачать» под каждой иконкой, затем замени файлы в папке <code>icons/</code></p>

<div class="cards">
  <div class="card">
    <canvas id="c512" width="512" height="512"></canvas>
    <div style="color:#94a3b8;margin-bottom:12px">512 × 512 px</div>
    <button onclick="download('c512','icon-512.png')">⬇ Скачать icon-512.png</button>
  </div>

  <div class="card">
    <canvas id="c192" width="192" height="192" style="width:192px;height:192px"></canvas>
    <div style="color:#94a3b8;margin-bottom:12px">192 × 192 px</div>
    <button onclick="download('c192','icon-192.png')">⬇ Скачать icon-192.png</button>
  </div>

  <div class="card">
    <canvas id="cbuild" width="512" height="512"></canvas>
    <div style="color:#94a3b8;margin-bottom:12px">512 × 512 px (Electron build)</div>
    <button onclick="download('cbuild','icon.png')">⬇ Скачать icon.png</button>
  </div>
</div>

<p class="status" id="status">Загрузка SVG…</p>

<script>
const SVG_PATH = 'icons/icon.svg'

async function loadSVGasImage(src, size) {
  return new Promise((resolve, reject) => {
    // Fetch SVG text и заменяем на blob URL — обходим CORS при открытии файла
    fetch(src)
      .then(r => r.text())
      .then(svgText => {
        const blob = new Blob([svgText], { type: 'image/svg+xml' })
        const url  = URL.createObjectURL(blob)
        const img  = new Image()
        img.onload  = () => { URL.revokeObjectURL(url); resolve(img) }
        img.onerror = reject
        img.width   = size
        img.height  = size
        img.src     = url
      })
      .catch(reject)
  })
}

async function renderAll() {
  const status = document.getElementById('status')
  try {
    const img512 = await loadSVGasImage(SVG_PATH, 512)
    const img192 = await loadSVGasImage(SVG_PATH, 192)

    ;[['c512', img512, 512], ['c192', img192, 192], ['cbuild', img512, 512]].forEach(([id, img, size]) => {
      const ctx = document.getElementById(id).getContext('2d')
      ctx.clearRect(0, 0, size, size)
      ctx.drawImage(img, 0, 0, size, size)
    })

    status.textContent = '✅ Иконки готовы — нажми «Скачать» под каждой'
  } catch (e) {
    status.textContent = '⚠ Ошибка загрузки SVG. Открой файл через локальный сервер (npx serve . -p 3000), затем зайди на http://localhost:3000/generate-icons.html'
    console.error(e)
  }
}

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId)
  const link   = document.createElement('a')
  link.download = filename
  link.href     = canvas.toDataURL('image/png')
  link.click()
}

renderAll()
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="75%">
      <stop offset="0%"   stop-color="#111827"/>
      <stop offset="100%" stop-color="#020509"/>
    </radialGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="96" height="96" rx="22" fill="url(#bg)"/>

  <!-- M (упрощённый вариант для малых размеров) -->
  <line x1="18" y1="20" x2="18" y2="76" stroke="url(#mGrad)" stroke-width="12" stroke-linecap="butt"/>
  <line x1="78" y1="20" x2="78" y2="76" stroke="url(#mGrad)" stroke-width="12" stroke-linecap="butt"/>
  <polyline points="18,20 48,52 78,20"
            fill="none" stroke="url(#mGrad)" stroke-width="10"
            stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="6"/>

  <!-- Золотая черта -->
  <line x1="14" y1="79" x2="82" y2="79" stroke="#f59e0b" stroke-width="2.5"
        stroke-linecap="round" opacity="0.8"/>
</svg>

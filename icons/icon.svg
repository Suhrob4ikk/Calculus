<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <!-- Фон: глубокий тёмно-синий с фиолетовым оттенком -->
    <radialGradient id="bg" cx="38%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#111827"/>
      <stop offset="60%"  stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#020509"/>
    </radialGradient>

    <!-- Градиент буквы M: от ярко-голубого до насыщенного синего -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#bfdbfe"/>
      <stop offset="35%"  stop-color="#60a5fa"/>
      <stop offset="70%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Градиент для акцентной линии (золото) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#f59e0b"/>
      <stop offset="70%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>

    <!-- Градиент для нижней формулы -->
    <linearGradient id="formulaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>

    <!-- Мягкое свечение для M -->
    <filter id="mGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Более сильное свечение для точки в центре -->
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- Свечение всего фона -->
    <filter id="bgBlob" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>

  </defs>

  <!-- ── Фон ── -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Мягкое голубое свечение-блоб сверху (глубина и атмосфера) -->
  <ellipse cx="200" cy="140" rx="180" ry="130"
           fill="#1e40af" opacity="0.22" filter="url(#bgBlob)"/>
  <!-- Второй блоб снизу справа -->
  <ellipse cx="340" cy="380" rx="140" ry="100"
           fill="#1e3a8a" opacity="0.18" filter="url(#bgBlob)"/>

  <!-- ── Буква M (геометрическая, без засечек) ── -->
  <!--
    M строится из четырёх прямых отрезков:
      Левая нога:     (108, 108) → (108, 410)
      Левая диагональ:(108, 108) → (256, 268)
      Правая диагональ:(256, 268) → (404, 108)
      Правая нога:    (404, 108) → (404, 410)
    Толщина обводки: 62px (ноги) и 52px (диагонали)
    Стыки: miter для острого угла сверху, round для V в центре
  -->

  <!-- Слой свечения (широкий, blur) -->
  <g filter="url(#mGlow)" opacity="0.6">
    <line x1="108" y1="108" x2="108" y2="410"
          stroke="#60a5fa" stroke-width="82" stroke-linecap="butt"/>
    <line x1="404" y1="108" x2="404" y2="410"
          stroke="#60a5fa" stroke-width="82" stroke-linecap="butt"/>
    <polyline points="108,108 256,272 404,108"
              fill="none" stroke="#60a5fa" stroke-width="68"
              stroke-linecap="butt" stroke-linejoin="round"/>
  </g>

  <!-- Основная геометрия M -->
  <!-- Левая нога -->
  <line x1="108" y1="108" x2="108" y2="410"
        stroke="url(#mGrad)" stroke-width="62" stroke-linecap="butt"/>
  <!-- Правая нога -->
  <line x1="404" y1="108" x2="404" y2="410"
        stroke="url(#mGrad)" stroke-width="62" stroke-linecap="butt"/>
  <!-- Две диагонали (V в центре) -->
  <polyline points="108,108 256,272 404,108"
            fill="none" stroke="url(#mGrad)" stroke-width="52"
            stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="6"/>

  <!-- Яркий блик на верхней части (эффект объёма) -->
  <line x1="108" y1="108" x2="108" y2="220"
        stroke="#dbeafe" stroke-width="12" stroke-linecap="butt" opacity="0.45"/>
  <line x1="404" y1="108" x2="404" y2="220"
        stroke="#dbeafe" stroke-width="12" stroke-linecap="butt" opacity="0.45"/>

  <!-- ── Горизонтальная золотая черта (нижний предел интеграла / акцент) ── -->
  <line x1="86" y1="420" x2="426" y2="420"
        stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- ── Светящаяся точка в вершине V (математический акцент) ── -->
  <!-- Ореол -->
  <circle cx="256" cy="272" r="22" fill="#3b82f6" opacity="0.3" filter="url(#dotGlow)"/>
  <!-- Основная точка -->
  <circle cx="256" cy="272" r="9" fill="#93c5fd"/>
  <!-- Центр точки -->
  <circle cx="256" cy="272" r="4" fill="#eff6ff"/>

  <!-- ── Нижняя подпись ── -->
  <!-- Маленькая формула "f(x)dx" намёком -->
  <text x="256" y="480"
        font-family="'Georgia','Times New Roman',serif"
        font-size="22" letter-spacing="2"
        fill="url(#formulaGrad)"
        text-anchor="middle"
        opacity="0.5">∫f(x)dx</text>

</svg>

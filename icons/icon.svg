<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <!-- Фон: глубокий тёмно-синий градиент -->
    <radialGradient id="bgGrad" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#0e1f3e"/>
      <stop offset="55%"  stop-color="#070f21"/>
      <stop offset="100%" stop-color="#020609"/>
    </radialGradient>

    <!-- Градиент интеграла: ярко-голубой → насыщенный синий -->
    <linearGradient id="intGrad" x1="25%" y1="5%" x2="75%" y2="95%">
      <stop offset="0%"   stop-color="#e0f2fe"/>
      <stop offset="30%"  stop-color="#7dd3fc"/>
      <stop offset="65%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>

    <!-- Градиент внешнего свечения -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Мягкое свечение за интегралом -->
    <filter id="softGlow" x="-55%" y="-20%" width="210%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feComposite in="blur" in2="blur" operator="over"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Лёгкий блюр для сияния фона -->
    <filter id="bgGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

  </defs>

  <!-- ── Фон ── -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Мягкое голубое свечение в верхнем левом углу (глубина) -->
  <ellipse cx="170" cy="145" rx="170" ry="130"
           fill="#1e3a5f" opacity="0.35" filter="url(#bgGlow)"/>

  <!-- Очень тонкая сетка — математическая бумага (едва видна) -->
  <g opacity="0.045" stroke="#7dd3fc" stroke-width="0.8">
    <line x1="0"   y1="128" x2="512" y2="128"/>
    <line x1="0"   y1="256" x2="512" y2="256"/>
    <line x1="0"   y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0"   x2="128" y2="512"/>
    <line x1="256" y1="0"   x2="256" y2="512"/>
    <line x1="384" y1="0"   x2="384" y2="512"/>
  </g>

  <!-- ── Знак интеграла ∫ ── -->

  <!-- Слой 1: широкое атмосферное свечение -->
  <path d="M 308,66
           C 364,48 416,90 380,144
           C 354,186 290,176 268,220
           L 252,256
           L 236,292
           C 214,338 150,328 124,373
           C 98,416 130,454 208,446"
        fill="none"
        stroke="#38bdf8"
        stroke-width="72"
        stroke-linecap="round"
        filter="url(#softGlow)"
        opacity="0.22"/>

  <!-- Слой 2: средний контур (объём) -->
  <path d="M 308,66
           C 364,48 416,90 380,144
           C 354,186 290,176 268,220
           L 252,256
           L 236,292
           C 214,338 150,328 124,373
           C 98,416 130,454 208,446"
        fill="none"
        stroke="#38bdf8"
        stroke-width="38"
        stroke-linecap="round"
        opacity="0.18"/>

  <!-- Слой 3: основной чёткий контур -->
  <path d="M 308,66
           C 364,48 416,90 380,144
           C 354,186 290,176 268,220
           L 252,256
           L 236,292
           C 214,338 150,328 124,373
           C 98,416 130,454 208,446"
        fill="none"
        stroke="url(#intGrad)"
        stroke-width="22"
        stroke-linecap="round"/>

  <!-- Слой 4: яркий блик на верхнем завитке -->
  <path d="M 308,66 C 364,48 416,90 380,144"
        fill="none"
        stroke="#e0f2fe"
        stroke-width="7"
        stroke-linecap="round"
        opacity="0.7"/>

  <!-- Слой 5: тонкий блик на нижнем завитке -->
  <path d="M 124,373 C 98,416 130,454 208,446"
        fill="none"
        stroke="#7dd3fc"
        stroke-width="4"
        stroke-linecap="round"
        opacity="0.45"/>

  <!-- ── Точка в центре (акцент, «золотое сечение») ── -->
  <circle cx="252" cy="256" r="10" fill="#38bdf8" opacity="0.25" filter="url(#bgGlow)"/>
  <circle cx="252" cy="256" r="5"  fill="#7dd3fc"/>
  <circle cx="252" cy="256" r="2"  fill="#e0f2fe"/>

  <!-- ── Надпись MC (едва видна, добавляет брендинг) ── -->
  <text x="256" y="492"
        font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif"
        font-size="30" font-weight="600" letter-spacing="6"
        fill="#38bdf8" text-anchor="middle" opacity="0.38">MC</text>

</svg>

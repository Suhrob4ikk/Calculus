<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep Ocean background -->
    <radialGradient id="bg" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#0d2035"/>
      <stop offset="60%" stop-color="#071525"/>
      <stop offset="100%" stop-color="#03080f"/>
    </radialGradient>
    <!-- Blue glow for integral -->
    <filter id="blueGlow" x="-60%" y="-30%" width="220%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Gold glow for circle -->
    <filter id="goldGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle outer ring (decorative) -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.09"/>

  <!-- ══ INTEGRAL CURVE (∫) — CYAN / BLUE GLOW ══ -->
  <!-- Wide soft glow behind -->
  <path d="M 293,76 C 346,62 396,100 365,148 C 336,192 280,180 263,218 L 248,256 L 234,294 C 217,334 162,322 136,366 C 111,408 140,447 212,448"
        fill="none" stroke="#38bdf8" stroke-width="62" stroke-linecap="round"
        filter="url(#blueGlow)" opacity="0.28"/>
  <!-- Medium glow -->
  <path d="M 293,76 C 346,62 396,100 365,148 C 336,192 280,180 263,218 L 248,256 L 234,294 C 217,334 162,322 136,366 C 111,408 140,447 212,448"
        fill="none" stroke="#38bdf8" stroke-width="34" stroke-linecap="round" opacity="0.22"/>
  <!-- Main crisp stroke -->
  <path d="M 293,76 C 346,62 396,100 365,148 C 336,192 280,180 263,218 L 248,256 L 234,294 C 217,334 162,322 136,366 C 111,408 140,447 212,448"
        fill="none" stroke="#7dd3fc" stroke-width="22" stroke-linecap="round"/>
  <!-- Bright highlight on upper half -->
  <path d="M 293,76 C 346,62 396,100 365,148 C 336,192 280,180 263,218"
        fill="none" stroke="#bae6fd" stroke-width="7" stroke-linecap="round" opacity="0.65"/>

  <!-- ══ GOLDEN CIRCLE (∮ contour element) — GOLD GLOW ══ -->
  <!-- Outermost soft aura -->
  <circle cx="256" cy="256" r="82" fill="none" stroke="#f59e0b"
          stroke-width="80" opacity="0.07" filter="url(#goldGlow)"/>
  <!-- Mid glow ring -->
  <circle cx="256" cy="256" r="82" fill="none" stroke="#f59e0b" stroke-width="32" opacity="0.18"/>
  <!-- Inner glow ring -->
  <circle cx="256" cy="256" r="82" fill="none" stroke="#fbbf24" stroke-width="16" opacity="0.35"/>
  <!-- Main golden ring -->
  <circle cx="256" cy="256" r="82" fill="none" stroke="#fbbf24" stroke-width="12"/>
  <!-- Bright highlight arc (top-left) — golden sheen -->
  <path d="M 204,216 A 82,82 0 0,1 312,212"
        fill="none" stroke="#fef08a" stroke-width="5" stroke-linecap="round" opacity="0.75"/>

  <!-- ══ CENTER φ POINT (golden section marker) ══ -->
  <!-- Outer halo -->
  <circle cx="256" cy="256" r="14" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <!-- Main dot -->
  <circle cx="256" cy="256" r="8" fill="#fbbf24"/>
  <!-- Bright center -->
  <circle cx="256" cy="256" r="3.5" fill="#fef9c3"/>
</svg>
